<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MaaS Docs</title>
  <style>
    :root {
      --bg: #f4f7f8;
      --paper: #ffffff;
      --ink: #17212b;
      --muted: #5d6a76;
      --line: #ced8df;
      --accent: #0f766e;
      --accent-2: #a04432;
      --accent-3: #2762a5;
      --soft: #eef4f6;
      --error: #a1193d;
      --shadow: 0 8px 24px rgba(23, 33, 43, 0.07);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.58;
    }

    .skip-link {
      position: absolute;
      top: -48px;
      left: 16px;
      z-index: 10;
      border-radius: 6px;
      background: var(--ink);
      color: #ffffff;
      padding: 8px 12px;
      font-weight: 750;
      text-decoration: none;
    }

    .skip-link:focus {
      top: 12px;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: var(--paper);
    }

    .header-inner,
    main {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
    }

    .header-inner {
      padding: 44px 0 34px;
    }

    .eyebrow {
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      line-height: 1.18;
      letter-spacing: 0;
    }

    h1 {
      font-size: 52px;
    }

    h2 {
      margin-bottom: 16px;
      font-size: 24px;
    }

    h3 {
      font-size: 19px;
    }

    p {
      margin: 10px 0 0;
      color: var(--muted);
    }

    .subtitle {
      max-width: 760px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .pill {
      display: inline-flex;
      min-height: 29px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--soft);
      padding: 4px 9px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 750;
    }

    main {
      padding: 32px 0 52px;
    }

    .pack-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .pack {
      display: grid;
      align-content: space-between;
      gap: 18px;
      min-width: 0;
      min-height: 238px;
      border: 1px solid var(--line);
      border-top: 5px solid var(--accent);
      border-radius: 8px;
      background: var(--paper);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .pack:nth-child(3n + 2) {
      border-top-color: var(--accent-2);
    }

    .pack:nth-child(3n) {
      border-top-color: var(--accent-3);
    }

    .pack p {
      overflow-wrap: anywhere;
    }

    .pack-path {
      font-size: 13px;
    }

    code {
      border-radius: 4px;
      background: var(--soft);
      padding: 1px 4px;
      color: #213142;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
      overflow-wrap: anywhere;
    }

    .links {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .links a {
      display: flex;
      min-height: 42px;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfd;
      padding: 9px 11px;
      color: #15559b;
      font-weight: 750;
      text-decoration: none;
    }

    .links a::after {
      content: "Open";
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .status-message {
      margin: 0;
    }

    .status-message.error {
      color: var(--error);
    }

    footer {
      margin-top: 30px;
      border-top: 1px solid var(--line);
      padding-top: 20px;
      color: var(--muted);
      font-size: 14px;
    }

    footer a {
      color: #15559b;
    }

    @media (max-width: 640px) {
      .header-inner,
      main {
        width: min(100% - 32px, 1180px);
      }

      .header-inner {
        padding: 34px 0 28px;
      }

      h1 {
        font-size: 38px;
      }

      main {
        padding-top: 24px;
      }

      .pack-grid {
        grid-template-columns: minmax(0, 1fr);
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header>
    <div class="header-inner">
      <div class="eyebrow">Serving and model references</div>
      <h1>MaaS Docs</h1>
      <p class="subtitle">Technical documentation for serving efficiency, model FLOPs, architecture, operations, and experiment reports.</p>
      <div id="catalog-meta" class="meta" aria-label="Catalog metadata" aria-live="polite">
        <span class="pill">Loading live catalog</span>
      </div>
    </div>
  </header>

  <main id="main">
    <section aria-labelledby="doc-packs">
      <h2 id="doc-packs">Doc Packs</h2>
      <div id="pack-grid" class="pack-grid" aria-busy="true">
        <article class="pack">
          <p class="status-message">Discovering documentation packs...</p>
        </article>
      </div>
    </section>

    <footer>
      Catalog source: <a href="https://github.com/tomyoung903/maas_docs/tree/main/docs"><code>docs/</code> on GitHub</a>
    </footer>
  </main>

  <noscript>This catalog requires JavaScript to discover its current documentation packs.</noscript>
  <script>
    (() => {
      "use strict";

      const treeUrl = "https://api.github.com/repos/tomyoung903/maas_docs/git/trees/main?recursive=1";
      const pathPrefix = "docs/";
      const packGrid = document.querySelector("#pack-grid");
      const catalogMeta = document.querySelector("#catalog-meta");

      const normalizeText = (value) => value.replace(/\s+/g, " ").trim();

      const titleFromSlug = (slug) => slug
        .split("-")
        .filter(Boolean)
        .map((word) => word.charAt(0).toUpperCase() + word.slice(1))
        .join(" ");

      const appendPill = (container, text) => {
        const pill = document.createElement("span");
        pill.className = "pill";
        pill.textContent = text;
        container.append(pill);
      };

      const extractPackMetadata = (html, slug) => {
        const childDocument = new DOMParser().parseFromString(html, "text/html");
        const pageTitle = childDocument.querySelector("title");
        const heading = childDocument.querySelector("h1");
        const description = childDocument.querySelector('meta[name="description"]');
        const title = normalizeText(pageTitle?.textContent || heading?.textContent || titleFromSlug(slug));
        const paragraph = Array.from(childDocument.querySelectorAll("main p, header p, body > p"))
          .map((node) => normalizeText(node.textContent || ""))
          .find((text) => text && text !== title);
        return {
          title,
          summary: normalizeText(description?.content || paragraph || `Documentation under ${slug}.`),
        };
      };

      const loadPack = async (entry, tree) => {
        const slug = entry.path.slice(pathPrefix.length).split("/")[0];
        const href = `./${encodeURIComponent(slug)}/`;
        const pagePrefix = `${pathPrefix}${slug}/`;
        const pageCount = tree.filter((item) => (
          item.type === "blob"
          && item.path.startsWith(pagePrefix)
          && item.path.endsWith(".html")
        )).length;
        const response = await fetch(`${href}?revision=${entry.sha}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`Could not read ${entry.path}`);
        const metadata = extractPackMetadata(await response.text(), slug);
        return { ...metadata, slug, href, pageCount };
      };

      const renderPacks = (packs) => {
        packGrid.replaceChildren();
        packGrid.setAttribute("aria-busy", "false");

        if (!packs.length) {
          const message = document.createElement("p");
          message.className = "status-message";
          message.textContent = "No documentation packs are currently published.";
          packGrid.append(message);
          return;
        }

        packs.forEach((pack) => {
          const article = document.createElement("article");
          article.className = "pack";

          const content = document.createElement("div");
          const heading = document.createElement("h3");
          heading.textContent = pack.title;
          const summary = document.createElement("p");
          summary.textContent = pack.summary;
          const metadata = document.createElement("div");
          metadata.className = "meta";
          metadata.setAttribute("aria-label", `${pack.title} metadata`);
          appendPill(metadata, `${pack.pageCount} ${pack.pageCount === 1 ? "HTML page" : "HTML pages"}`);
          const path = document.createElement("p");
          path.className = "pack-path";
          const code = document.createElement("code");
          code.textContent = `${pack.slug}/`;
          path.append(code);
          content.append(heading, summary, metadata, path);

          const links = document.createElement("ul");
          links.className = "links";
          const item = document.createElement("li");
          const link = document.createElement("a");
          link.href = pack.href;
          link.textContent = "Open doc pack";
          item.append(link);
          links.append(item);

          article.append(content, links);
          packGrid.append(article);
        });
      };

      const renderError = (error) => {
        packGrid.replaceChildren();
        packGrid.setAttribute("aria-busy", "false");
        const message = document.createElement("p");
        message.className = "status-message error";
        message.textContent = "The live catalog could not be loaded. Open the GitHub directory link below to browse its contents.";
        packGrid.append(message);
        catalogMeta.replaceChildren();
        appendPill(catalogMeta, "Catalog unavailable");
        console.error(error);
      };

      const initialize = async () => {
        try {
          const response = await fetch(treeUrl, { cache: "no-store" });
          if (!response.ok) throw new Error(`GitHub tree request failed with ${response.status}`);
          const payload = await response.json();
          if (!Array.isArray(payload.tree) || payload.truncated) {
            throw new Error("GitHub returned an incomplete repository tree");
          }

          const entries = payload.tree
            .filter((entry) => entry.type === "blob" && /^docs\/[^/]+\/index\.html$/.test(entry.path))
            .sort((left, right) => left.path.localeCompare(right.path));
          const packs = await Promise.all(entries.map(async (entry) => {
            try {
              return await loadPack(entry, payload.tree);
            } catch (error) {
              const slug = entry.path.slice(pathPrefix.length).split("/")[0];
              console.warn(error);
              return {
                slug,
                href: `./${encodeURIComponent(slug)}/`,
                title: titleFromSlug(slug),
                summary: `Documentation under ${slug}.`,
                pageCount: payload.tree.filter((item) => (
                  item.type === "blob"
                  && item.path.startsWith(`${pathPrefix}${slug}/`)
                  && item.path.endsWith(".html")
                )).length,
              };
            }
          }));

          renderPacks(packs);
          catalogMeta.replaceChildren();
          appendPill(catalogMeta, `${packs.length} ${packs.length === 1 ? "doc pack" : "doc packs"}`);
        } catch (error) {
          renderError(error);
        }
      };

      initialize();
    })();
  </script>
</body>
</html>

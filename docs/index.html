<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MaaS Docs</title>
  <style>
    :root {
      --bg: #f6f1e8;
      --ink: #1d241f;
      --muted: #5c665f;
      --card: #fffaf0;
      --line: #d8cdbc;
      --accent: #9b4d24;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(155, 77, 36, 0.16), transparent 32rem),
        linear-gradient(135deg, var(--bg), #ebe4d6);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }
    main {
      width: min(760px, calc(100vw - 40px));
      padding: 44px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: color-mix(in srgb, var(--card) 92%, white);
      box-shadow: 0 24px 80px rgba(60, 42, 24, 0.14);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(36px, 7vw, 76px);
      letter-spacing: -0.06em;
      line-height: 0.9;
    }
    p {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      padding: 14px 18px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font: 700 15px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
    }
  </style>
</head>
<body>
  <main>
    <h1>MaaS Docs</h1>
    <p>Static references for serving efficiency, model FLOPs, architecture diagrams, and verification notebooks.</p>
    <a href="./kimi25-flops/">Open Kimi K2.5 FLOPs Pack</a>
  </main>
</body>
</html>
